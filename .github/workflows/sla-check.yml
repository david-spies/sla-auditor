name: SLA Architectural Guardrail

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop, staging]

concurrency:
  group: sla-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sla-detect:
    name: "SLA: Detect Violations"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies and Build CLI
        run: |
          npm ci
          npm run build
          sudo npm link

      - name: Get Changed Files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only origin/${{ github.base_ref }}...HEAD \
              | grep -E '\.(ts|tsx|js|jsx|py|go|rs|sql|ya?ml)$' \
              > changed_files.txt || true
          else
            git diff --name-only HEAD~1 HEAD \
              | grep -E '\.(ts|tsx|js|jsx|py|go|rs|sql|ya?ml)$' \
              > changed_files.txt || true
          fi
          echo "Files to audit:"
          cat changed_files.txt || echo "(none)"

      - name: Run SLA Audit
        run: |
          if [ -s changed_files.txt ]; then
            sla audit --files-from changed_files.txt --json --output audit_results.json || true
          else
            echo '{"totalViolations":0,"failedFiles":0,"criticalCount":0,"highCount":0,"mediumCount":0,"lowCount":0,"totalFiles":0,"passedFiles":0,"fixedFiles":0,"results":[]}' > audit_results.json
          fi
          echo "Audit results:"
          cat audit_results.json

      - name: Upload Audit Report
        uses: actions/upload-artifact@v4
        with:
          name: sla-audit-report
          path: audit_results.json
          retention-days: 30

      - name: Enforce Gate
        run: |
          CRITICAL=$(python3 -c "import sys,json; d=json.load(open('audit_results.json')); print(d.get('criticalCount',0))")
          FAILED=$(python3 -c "import sys,json; d=json.load(open('audit_results.json')); print(d.get('failedFiles',0))")
          echo "Critical: $CRITICAL | Failed files: $FAILED"
          if [ "$CRITICAL" -gt "0" ]; then
            echo "❌ CRITICAL violations detected. Merge blocked."
            exit 1
          fi
          echo "✅ SLA Gate: PASSED"
